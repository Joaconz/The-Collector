<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Custom Input Styles */
        input:focus, textarea:focus, select:focus {
            outline: none !important;
            box-shadow: none !important;
            border-color: #dec2a3 !important;
        }
    </style>

<body class="bg-background text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopNavBar (Transactional/Wizard Context - Simplified) -->
<header class="h-[80px] w-full flex items-center justify-between px-margin-mobile md:px-margin-desktop bg-surface border-b border-outline-variant z-50 sticky top-0">
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center gap-2 group">
<span class="material-symbols-outlined text-[20px] group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span class="font-label-caps text-label-caps hidden md:block">CANCELAR PUBLICACIÓN</span>
</button>
</div>
<div class="font-label-caps text-label-caps text-primary tracking-[0.15em]">
            THE COLLECTOR
        </div>
<div class="w-[100px] flex justify-end">
<span class="font-label-caps text-label-caps text-on-surface-variant hidden md:block">BORRADOR GUARDADO</span>
</div>
</header>
<main class="flex-grow flex flex-col max-w-container-max mx-auto w-full px-margin-mobile md:px-margin-desktop py-12 md:py-24">
<!-- Wizard Header & Stepper -->
<div class="max-w-3xl mx-auto w-full mb-16 text-center">
<h1 class="font-headline-md text-headline-md text-on-surface mb-8">Publicar Pieza</h1>
<div class="flex items-center justify-center gap-4 md:gap-8 max-w-lg mx-auto">
<!-- Step 1 Indicator -->
<div class="flex flex-col items-center gap-2">
<div class="w-10 h-10 rounded-full border border-primary text-primary flex items-center justify-center font-label-caps text-label-caps">
                        1
                    </div>
<span class="font-label-caps text-label-caps text-primary">DETALLES</span>
</div>
<!-- Divider -->
<div class="h-px w-16 md:w-24 bg-outline-variant"></div>
<!-- Step 2 Indicator (Inactive) -->
<div class="flex flex-col items-center gap-2 opacity-50">
<div class="w-10 h-10 rounded-full border border-outline-variant text-on-surface-variant flex items-center justify-center font-label-caps text-label-caps">
                        2
                    </div>
<span class="font-label-caps text-label-caps text-on-surface-variant">MODO</span>
</div>
</div>
</div>
<!-- Step 1 Content: Form -->
<div class="max-w-3xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-12">
<!-- Left Column: Images -->
<div class="flex flex-col gap-6">
<h2 class="font-label-caps text-label-caps text-on-surface-variant">IMÁGENES (MÁX 5)</h2>
<!-- Drag & Drop Zone -->
<div class="aspect-[4/5] border border-dashed border-outline-variant bg-surface flex flex-col items-center justify-center gap-4 cursor-pointer hover:border-primary hover:bg-surface-container transition-colors group relative overflow-hidden">
<span class="material-symbols-outlined text-[48px] text-on-surface-variant group-hover:text-primary transition-colors">add_photo_alternate</span>
<div class="text-center px-6">
<p class="font-label-caps text-label-caps text-on-surface mb-2">ARRASTRA TUS IMÁGENES AQUÍ</p>
<p class="font-metadata text-metadata text-on-surface-variant">O haz clic para seleccionar archivos JPG, PNG. Recomendado: Alta resolución, fondo neutro.</p>
</div>
<!-- Hidden file input would go here -->
</div>
<!-- Image Thumbnails (Empty State Placeholders) -->
<div class="grid grid-cols-4 gap-4">
<div class="aspect-square border border-dashed border-outline-variant bg-surface flex items-center justify-center opacity-50"><span class="material-symbols-outlined text-[20px] text-on-surface-variant">add</span></div>
<div class="aspect-square border border-dashed border-outline-variant bg-surface flex items-center justify-center opacity-50"><span class="material-symbols-outlined text-[20px] text-on-surface-variant">add</span></div>
<div class="aspect-square border border-dashed border-outline-variant bg-surface flex items-center justify-center opacity-50"><span class="material-symbols-outlined text-[20px] text-on-surface-variant">add</span></div>
<div class="aspect-square border border-dashed border-outline-variant bg-surface flex items-center justify-center opacity-50"><span class="material-symbols-outlined text-[20px] text-on-surface-variant">add</span></div>
</div>
</div>
<!-- Right Column: Fields -->
<div class="flex flex-col gap-8">
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="name">NOMBRE DE LA PIEZA</label>
<input class="w-full bg-background border border-outline-variant text-on-surface font-body-md text-body-md p-4 placeholder:text-on-surface-variant/50 transition-colors" id="name" placeholder="Ej. Rolex Submariner 1680 'Red'" type="text">
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="category">CATEGORÍA</label>
<div class="relative">
<select class="w-full bg-background border border-outline-variant text-on-surface font-body-md text-body-md p-4 appearance-none transition-colors cursor-pointer" id="category">
<option disabled="" selected="" value="">Selecciona una categoría</option>
<option value="relojes">Relojes</option>
<option value="joyeria">Joyería</option>
<option value="arte">Arte</option>
<option value="numismatica">Numismática</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-on-surface-variant" for="history">HISTORIA Y PROCEDENCIA</label>
<textarea class="w-full bg-background border border-outline-variant text-on-surface font-body-md text-body-md p-4 placeholder:text-on-surface-variant/50 transition-colors resize-none" id="history" placeholder="Describe la historia de la pieza, marcas, estado de conservación y cualquier documento de autenticidad que poseas..." rows="6"></textarea>
</div>
</div>
</div>
<!-- Wizard Footer Actions -->
<div class="max-w-3xl mx-auto w-full mt-16 pt-8 border-t border-outline-variant flex justify-end">
<button class="bg-primary-container text-on-primary-container px-8 py-4 font-label-caps text-label-caps hover:bg-primary transition-colors flex items-center gap-2">
                CONTINUAR
                <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</main>
<!-- Footer (Simplified for Transactional Context) -->
<footer class="bg-surface border-t border-outline-variant w-full py-unit*4 mt-auto">
<div class="flex justify-center items-center w-full px-margin-desktop max-w-container-max mx-auto">
<span class="font-label-caps text-label-caps text-on-surface-variant">© 2024 THE COLLECTOR. ALL RIGHTS RESERVED.</span>
</div>
</footer>
</body></html>
